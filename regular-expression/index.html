<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RegEx Validation</title>
    <!-- <link rel="stylesheet" href="../tailwind-components/style/output.css"> -->
</head>

<body>
    <section>
        <!-- Box Input Pertama -->
        <div class="relative w-full">
            <label for="regexInputahsan">Regex Pertama: Format validasi url dengan HTTP atau HTTPS</label><br>
            <input id="regexInputahsan" type="text" placeholder="Masukkan input regex"/>
            <p><small><span id="validation-text-ahsan">Validation message.</span></small></p>
        </div>

        <!-- Box Input Kedua -->
        <div class="relative w-full">
            <label for="regexInputahsan2">Regex Kedua: Format validasi tanggal</label><br>
            <input id="regexInputahsan2" type="text" placeholder="Masukkan input regex" />
            <p><small><span id="validation-text-ahsan2">Validation message.</span></small></p>
        </div>

        <!-- Box Input Ketiga -->
        <div class="relative w-full">
            <label for="regexInputahsan3">Regex Ketiga: Format validasi IP</label><br>
            <input id="regexInputahsan3" type="text" placeholder="Masukkan input regex"/>
            <p><small><span id="validation-text-ahsan3">Validation message.</span></small></p>
        </div>

        <!-- Box Input Keempat -->
        <div class="relative w-full">
            <label for="regexInputahsan4">Regex Keempat: Minimal 12 karakter, memiliki setidaknya satu huruf kapital, satu huruf kecil, satu angka, satu karakter khusus</label><br>
            <input id="regexInputahsan4" type="text" placeholder="Masukkan input regex"/>
            <p><small><span id="validation-text-ahsan4">Validation message.</span></small></p>
        </div>

        <!-- Box Input Kelima -->
        <div class="relative w-full">
            <label for="regexInputahsan5">Regex Kelima: Hanya untuk memvalidasi alamat email dengan format standar</label><br>
            <input id="regexInputahsan5" type="text" placeholder="Masukkan input regex"/>
            <p><small><span id="validation-text-ahsan5">Validation message.</span></small></p>
        </div>
    </section>

    <script src="script.js"></script>
</body>

</html>
